<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Principio de supremacía constitucional — Daniel Babun · USAP</title>
<meta name="description" content="Trabajo de Derecho Constitucional sobre el principio de supremacía constitucional. Facultad de Derecho, USAP.">
<style>
  :root{
    --azul:#00407A; --azul-dk:#002850; --naranja:#FF5200;
    --blanco:#FFFFFF; --soft:#ABC4DB;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI",Inter,Helvetica,Arial,sans-serif;
    color:var(--blanco);
    background:radial-gradient(120% 90% at 80% 0%, #0a4f93 0%, var(--azul) 45%, var(--azul-dk) 100%);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(20px,4vw,56px);
  }
  .wrap{width:100%; max-width:1040px}
  .eyebrow{
    color:var(--naranja); font-weight:800;
    letter-spacing:.16em; text-transform:uppercase;
    font-size:clamp(12px,1.4vw,15px); margin:0 0 10px;
  }
  h1{
    font-weight:900; line-height:1.04; margin:0 0 14px;
    font-size:clamp(28px,5.2vw,58px); letter-spacing:-.01em;
  }
  .meta{
    color:var(--soft); font-size:clamp(15px,1.8vw,19px);
    margin:0 0 clamp(20px,3vw,32px); font-weight:500;
  }
  .meta b{color:var(--blanco); font-weight:700}
  .rule{height:5px; width:96px; background:var(--naranja); border-radius:3px; margin:0 0 26px}
  .player{
    position:relative; width:100%; border-radius:16px; overflow:hidden;
    background:#000; box-shadow:0 24px 70px rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.08);
  }
  video{display:block; width:100%; height:auto; background:#000}
  .actions{display:flex; flex-wrap:wrap; gap:14px; margin-top:22px; align-items:center}
  .btn{
    display:inline-flex; align-items:center; gap:9px;
    background:var(--naranja); color:#fff; text-decoration:none;
    font-weight:800; font-size:clamp(15px,1.7vw,17px);
    padding:13px 22px; border-radius:11px; transition:transform .12s ease, filter .12s ease;
  }
  .btn:hover{transform:translateY(-1px); filter:brightness(1.06)}
  .btn.ghost{background:transparent; color:var(--soft); border:1px solid rgba(171,196,219,.4)}
  footer{
    color:var(--soft); font-size:clamp(13px,1.4vw,15px);
    margin-top:clamp(28px,4vw,44px); opacity:.85;
  }
</style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Facultad de Derecho · Derecho Constitucional</p>
    <h1>Principio de supremacía constitucional</h1>
    <p class="meta"><b>Daniel Babun</b> · USAP · Junio 2026</p>
    <div class="rule"></div>

    <div class="player">
      <video controls controlsList="nodownload noremoteplayback" disablePictureInPicture
             preload="metadata" playsinline poster="poster.png" oncontextmenu="return false">
        <source src="video.mp4?v=1781957464" type="video/mp4">
        Tu navegador no reproduce video HTML5.
      </video>
    </div>

    <footer>Universidad de San Pedro Sula · Facultad de Derecho · Trabajo de Derecho Constitucional.</footer>
  </main>
</body>
</html>
